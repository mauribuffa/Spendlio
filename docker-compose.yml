services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: spendlio
      POSTGRES_PASSWORD: spendlio
      POSTGRES_DB: spendlio
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spendlio"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports: ["6379:6379"]
    volumes: ["redisdata:/data"]

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: spendlio
      MINIO_ROOT_PASSWORD: spendlio123
    ports: ["9000:9000", "9001:9001"]
    volumes: ["miniodata:/data"]

  # one-shot: create the "receipts" bucket on startup
  minio-setup:
    image: minio/mc
    depends_on: [minio]
    entrypoint: >
      /bin/sh -c "
      until (mc alias set local http://minio:9000 spendlio spendlio123) do sleep 1; done;
      mc mb -p local/receipts;
      mc anonymous set none local/receipts;
      exit 0;"

  # local SMTP sink: catches all OTP email; read it at http://localhost:8025
  mailpit:
    image: axllent/mailpit
    ports: ["1025:1025", "8025:8025"]   # 1025 SMTP, 8025 web inbox

volumes:
  pgdata: {}
  redisdata: {}
  miniodata: {}
