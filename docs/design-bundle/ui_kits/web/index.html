<!-- @dsCard group="Spendlio Web" viewport="1320x840" name="Spendlio web dashboard" subtitle="Onboarding · Overview · Accounts · Assistant · Add/OCR · Recap" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Spendlio — web dashboard</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html, body { margin: 0; height: 100%; }
  body {
    background:
      radial-gradient(1200px 700px at 50% -8%, var(--green-50), transparent 62%),
      var(--neutral-150);
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 24px; box-sizing: border-box;
    font-family: var(--font-sans);
  }
  ::-webkit-scrollbar { width: 9px; height: 9px; }
  ::-webkit-scrollbar-thumb { background: var(--neutral-300); border-radius: 999px; }
  ::-webkit-scrollbar-track { background: transparent; }
  @keyframes spx-fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes spx-pop { from { opacity: 0; transform: translateY(8px) scale(0.98); } to { opacity: 1; transform: none; } }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" src="browser-window.jsx"></script>
<script src="data.js"></script>
<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="Onboarding.jsx"></script>
<script type="text/babel" src="Overview.jsx"></script>
<script type="text/babel" src="Transactions.jsx"></script>
<script type="text/babel" src="Accounts.jsx"></script>
<script type="text/babel" src="Budgets.jsx"></script>
<script type="text/babel" src="Split.jsx"></script>
<script type="text/babel" src="Assistant.jsx"></script>
<script type="text/babel" src="Settings.jsx"></script>
<script type="text/babel" src="Modals.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
  const App = window.SpendlioWebApp;
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  const tick = () => window.lucide && lucide.createIcons();
  requestAnimationFrame(() => { tick(); setTimeout(tick, 120); setTimeout(tick, 400); });
</script>
</body>
</html>
