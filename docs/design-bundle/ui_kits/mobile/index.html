<!-- @dsCard group="Spendlio Mobile" viewport="480x900" name="Spendlio iOS app" subtitle="Home · Activity · Split · Assistant · Add-expense flow" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Spendlio — iOS app</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html, body { margin: 0; height: 100%; }
  body {
    background:
      radial-gradient(1100px 700px at 50% -10%, var(--green-50), transparent 60%),
      var(--surface-canvas);
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 28px; box-sizing: border-box;
    font-family: var(--font-sans);
  }
  /* scale the device down a touch so chrome is comfortable in-card */
  #stage { transform: scale(0.96); transform-origin: center; }
  ::-webkit-scrollbar { width: 0; height: 0; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script src="data.js"></script>
<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="OnboardingScreen.jsx"></script>
<script type="text/babel" src="AuthScreen.jsx"></script>
<script type="text/babel" src="HomeScreen.jsx"></script>
<script type="text/babel" src="AccountsScreen.jsx"></script>
<script type="text/babel" src="SettingsScreen.jsx"></script>
<script type="text/babel" src="ActivityScreen.jsx"></script>
<script type="text/babel" src="SettleScreen.jsx"></script>
<script type="text/babel" src="ChatScreen.jsx"></script>
<script type="text/babel" src="AddExpenseSheet.jsx"></script>
<script type="text/babel" src="ReceiptScanSheet.jsx"></script>
<script type="text/babel" src="MonthlyRecapSheet.jsx"></script>
<script type="text/babel" src="App.jsx"></script>
</head>
<body>
<div id="stage"><div id="root"></div></div>
<script type="text/babel" data-presets="react">
  const App = window.SpendlioApp;
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  const tick = () => window.lucide && lucide.createIcons();
  requestAnimationFrame(() => { tick(); setTimeout(tick, 120); setTimeout(tick, 400); });
</script>
</body>
</html>
