<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;padding:24px;background:var(--surface-canvas);font-family:var(--font-sans)}
  .sec{margin-bottom:22px}
  .lbl{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text-subtle);margin-bottom:10px}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Button, IconButton, Badge, Avatar, AvatarGroup, Card, Tag } = window.SpendlioDesignSystem_5a5954;
const I = ({n}) => <i data-lucide={n}></i>;

function Demo(){
  React.useEffect(()=>{ window.lucide && lucide.createIcons(); });
  return (
    <div>
      <div className="sec">
        <div className="lbl">Buttons</div>
        <div className="row">
          <Button variant="primary" leadingIcon={<I n="plus"/>}>Add expense</Button>
          <Button variant="secondary">Edit</Button>
          <Button variant="ghost">Cancel</Button>
          <Button variant="accent">Upgrade</Button>
          <Button variant="danger">Delete</Button>
          <Button variant="quiet" size="sm">Skip</Button>
        </div>
      </div>
      <div className="sec">
        <div className="lbl">Icon buttons &nbsp;·&nbsp; Tags</div>
        <div className="row">
          <IconButton icon={<I n="arrow-left-right"/>} label="Split" variant="brand"/>
          <IconButton icon={<I n="search"/>} label="Search" variant="solid"/>
          <IconButton icon={<I n="ellipsis"/>} label="More"/>
          <span style={{width:14}}></span>
          <Tag selectable selected color="#1B6E4F">Groceries</Tag>
          <Tag color="#3A6BAB">Transport</Tag>
          <Tag onRemove={()=>{}}>May 2026</Tag>
        </div>
      </div>
      <div className="sec">
        <div className="lbl">Badges</div>
        <div className="row">
          <Badge tone="positive" dot>Settled</Badge>
          <Badge tone="negative">You owe $24.50</Badge>
          <Badge tone="brand">Recurring</Badge>
          <Badge tone="warning">Due soon</Badge>
          <Badge tone="info">Synced</Badge>
          <Badge tone="outline">Pending</Badge>
        </div>
      </div>
      <div className="grid2">
        <Card title="Roommates" action={<IconButton icon={<I n="ellipsis"/>} label="More" size="sm"/>}>
          <div className="row" style={{justifyContent:'space-between'}}>
            <AvatarGroup people={[{name:'Maya Okafor'},{name:'Sam Reed'},{name:'Lee Park'},{name:'Ari Cohen'},{name:'Jo Diaz'}]} max={4}/>
            <Badge tone="negative">You owe $42</Badge>
          </div>
        </Card>
        <Card variant="inverse" padded>
          <div style={{fontSize:12,opacity:.8,fontWeight:600,letterSpacing:'.04em'}}>TOTAL BALANCE</div>
          <div style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:30,marginTop:4}} data-money>$2,480.50</div>
          <div className="row" style={{marginTop:12}}>
            <Avatar name="You" size="sm"/><Avatar name="Maya Okafor" size="sm"/><Avatar name="Sam Reed" size="sm"/>
          </div>
        </Card>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body></html>
