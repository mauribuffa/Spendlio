<!-- @dsCard group="Components" viewport="700x460" name="Forms — Input, Amount, Select, Switch, Checkbox, Segmented" subtitle="Inputs & controls" -->
<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;padding:24px;background:var(--surface-canvas);font-family:var(--font-sans)}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:18px 24px;align-items:start}
  .stack{display:flex;flex-direction:column;gap:14px}
  .lbl{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text-subtle);margin-bottom:10px}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Input, AmountInput, Select, Switch, Checkbox, SegmentedControl } = window.SpendlioDesignSystem_5a5954;
const I = ({n}) => <i data-lucide={n}></i>;

function Demo(){
  const [tab,setTab]=React.useState('Spending');
  const [mode,setMode]=React.useState('even');
  const [amt,setAmt]=React.useState('48.00');
  const [rec,setRec]=React.useState(true);
  const [c1,setC1]=React.useState(true);
  React.useEffect(()=>{ window.lucide && lucide.createIcons(); });
  return (
    <div>
      <div style={{marginBottom:20}}>
        <SegmentedControl options={['Spending','Income']} value={tab} onChange={setTab}/>
      </div>
      <div className="grid">
        <div className="stack">
          <Input label="Description" placeholder="e.g. Dinner at Olio" leadingIcon={<I n="receipt"/>}/>
          <Select label="Category" options={['Groceries','Dining','Transport','Housing','Shopping']} value="Dining" onChange={()=>{}}/>
          <Input label="Amount" error="Enter a number greater than 0" defaultValue="0"/>
        </div>
        <div className="stack">
          <div><div className="lbl">Amount</div><AmountInput value={amt} onChange={e=>setAmt(e.target.value)}/></div>
          <div><div className="lbl">Split mode</div>
            <SegmentedControl fullWidth value={mode} onChange={setMode}
              options={[{value:'even',label:'Evenly'},{value:'exact',label:'Exact'},{value:'pct',label:'%'}]}/>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:12,paddingTop:4}}>
            <Switch checked={rec} onChange={e=>setRec(e.target.checked)} label="Repeat monthly"/>
            <Checkbox round checked={c1} onChange={e=>setC1(e.target.checked)} label="Maya Okafor"/>
            <Checkbox round checked={false} onChange={()=>{}} label="Sam Reed"/>
          </div>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body></html>
