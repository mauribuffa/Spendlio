<!-- @dsCard group="Components" viewport="700x360" name="Feedback — Toast, Empty state, Skeleton" subtitle="Status & loading" -->
<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;padding:24px;background:var(--surface-canvas);font-family:var(--font-sans)}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start}
  .lbl{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text-subtle);margin-bottom:10px}
  .col{display:flex;flex-direction:column;gap:12px}
  .panel{background:var(--surface-card);border:1px solid var(--border-subtle);border-radius:var(--radius-card);box-shadow:var(--shadow-sm);padding:8px 16px}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Toast, EmptyState, Skeleton, SkeletonRow, Button } = window.SpendlioDesignSystem_5a5954;
const I = ({n}) => <i data-lucide={n}></i>;

function Demo(){
  React.useEffect(()=>{ window.lucide && lucide.createIcons(); });
  return (
    <div className="grid">
      <div className="col">
        <div className="lbl">Toasts</div>
        <Toast title="Expense added" message="Split with Maya · $24.50 each"/>
        <Toast tone="info" title="Reminder sent to Maya" actionLabel="Undo" onAction={()=>{}}/>
        <Toast tone="error" title="That receipt didn't scan" message="Try a brighter photo, or add items by hand."/>
        <div className="lbl" style={{marginTop:8}}>Loading</div>
        <div className="panel"><SkeletonRow/><SkeletonRow/></div>
      </div>
      <div className="col">
        <div className="lbl">Empty state</div>
        <div className="panel" style={{padding:0}}>
          <EmptyState icon="receipt-text" title="No expenses yet"
            message="Add your first one to start tracking where your money goes."
            action={<Button leadingIcon={<I n="plus"/>}>Add expense</Button>}/>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body></html>
